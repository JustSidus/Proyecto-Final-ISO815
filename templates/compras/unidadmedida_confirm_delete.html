{% extends 'base.html' %}
{% block title %}Eliminar Unidad de Medida{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-danger">
      <div class="card-header bg-danger text-white">
        <h5 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Confirmar Eliminación</h5>
      </div>
      <div class="card-body">
        <p>¿Eliminar la unidad de medida <strong>{{ object.descripcion }}</strong>?</p>
        <p class="text-muted small">Esta acción no se puede deshacer.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2 justify-content-end">
            <a href="{% url 'compras:unidadmedida-list' %}" class="btn btn-outline-secondary">Cancelar</a>
            <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Sí, eliminar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
